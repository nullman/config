ramp-capacity-1 = σΑ¹Φ
ramp-capacity-2 = σΑ¹Ψ
ramp-capacity-3 = σΑ²Ä
ramp-capacity-4 = σΑ²²

[module/cpu]
type = internal/cpu
interval = 2
;format-prefix = "CPU "
format-prefix = "σΑç¦ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
;format-prefix = "RAM "
format-prefix = "νâΠ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[filesystem-base]
type = internal/fs
interval = 30
label-unmounted = ""
label-unmounted-foreground = ${colors.disabled}

[module/root]
inherit = filesystem-base
mount-0 = /
label-mounted = %{F#F0C674}σΑÜΦ%{F-} %percentage_used%%

[module/home]
inherit = filesystem-base
mount-0 = /home
label-mounted = %{F#F0C674}ο™Δ%{F-} %percentage_used%%

[module/volume]
type = internal/pulseaudio
;format-volume-prefix = "VOL "
format-volume-prefix = "σΑïΨ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = MUTED
label-muted-foreground = ${colors.disabled}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/lock]
type = internal/xkeyboard
format = <label-indicator>
format-spacing = 0
blacklist-0 = scroll lock
label-indicator-padding = 1
label-indicator-margin = 1
label-indicator-foreground = ${colors.primary}
label-indicator-background = ${colors.background}
;label-indicator-on-capslock = "%{F#F0C674}CAP%{F-}"
;label-indicator-off-capslock = "%{F#707880}CAP%{F-}"
;label-indicator-on-numlock = "%{F#F0C674}NUM%{F-}"
;label-indicator-off-numlock = "%{F#707880}NUM%{F-}"
;label-indicator-on-scrolllock = "%{F#F0C674}SCR%{F-}"
;label-indicator-off-scrolllock = "%{F#707880}SCR%{F-}"
;label-indicator-on-capslock = "%{F#F0C674}β΅Σ%{F-}"
;label-indicator-off-capslock = "%{F#707880}β΅Σ%{F-}"
;label-indicator-on-numlock = "%{F#F0C674}β΅≠%{F-}"
;label-indicator-off-numlock = "%{F#707880}β΅≠%{F-}"
;label-indicator-on-scrolllock = "%{F#F0C674}β΅§%{F-}"
;label-indicator-off-scrolllock = "%{F#707880}β΅§%{F-}"
label-indicator-on-capslock = "%{F#F0C674}σΑ§ä%{F-}"
label-indicator-off-capslock = "%{F#707880}σΑ·±%{F-}"
