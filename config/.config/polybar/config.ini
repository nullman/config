[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bottom]
bottom = true
width = 100%
height = 20pt
radius = 0
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0pt
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 1

;separator = |
;separator-foreground = ${colors.disabled}

;font-0 = monospace;2
font-0 = MesloLGS Nerd Font Mono-12

modules-left = xworkspaces xwindow
;modules-center = mpd
modules-right = systray battery cpu memory root home volume lock date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

override-redirect = true
;wm-restack = generic
wm-restack = bspwm
;wm-restack = i3

[module/xworkspaces]
type = internal/xworkspaces
;icon-0 = Workspace 1;ο³†
;icon-1 = Workspace 2;ν‰≤
