[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bottom]
bottom = true
width = 100%
height = 20pt
radius = 0
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0pt
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 1

;separator = |
;separator-foreground = ${colors.disabled}

;font-0 = monospace;2
font-0 = MesloLGS Nerd Font Mono-12

modules-left = qubes xworkspaces xwindow
;modules-center = mpd
modules-right = systray battery cpu memory root home volume lock date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

override-redirect = true
;wm-restack = generic
wm-restack = bspwm
;wm-restack = i3

[module/qubes]
type = custom/text
label = 
click-left = gdbus call --session --dest org.qubesos.appmenu --object-path '/org/qubesos/appmenu' --method org.freedesktop.Application.Activate '{}'

[module/xworkspaces]
type = internal/xworkspaces
;icon-0 = Workspace 1;
;icon-1 = Workspace 2;
;icon-2 = Workspace 3;
;icon-3 = Workspace 4;
;icon-4 = Workspace 5;
;icon-5 = Workspace 6;
;icon-6 = Workspace 7;
;icon-7 = Workspace 8;
;icon-8 = Workspace 9;
;icon-9 = Workspace 10;
;icon-10 = Workspace 11;
;icon-11 = Workspace 12;
icon-default = 
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:…%

[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600
interval = 1
;format-online = <icon-prev> <icon-seekb> <icon-stop> <toggle> <icon-seekf> <icon-next>  <icon-repeat> <icon-random>  <bar-progress> <label-time>  <label-song>
format-online = <icon-prev> <icon-seekb> <icon-stop> <toggle> <icon-seekf> <icon-next>  <label-song> <label-time>
label-song = 󰎇 %artist:0:30:…% - %title:0:30:…%
label-time = (%elapsed%/%total%)
label-offline =
icon-play = 
icon-pause = 
icon-stop = 
icon-prev = 󰒮
icon-next = 󰒭
icon-seekb = 
icon-seekf = 
icon-random = 
icon-repeat = 
icon-single = 󰑘
icon-consume = ✀
toggle-on-foreground = #ff
toggle-off-foreground = #55
bar-progress-width = 45
bar-progress-indicator = |
bar-progress-fill = ─
bar-progress-empty = ─

[module/systray]
type = internal/tray
format-margin = 4pt
tray-spacing = 4pt

[module/battery]
; 󰁺 󰁻 󰁼 󰁽 󰁾 󰁿 󰂀 󰂁 󰂂 󰁹
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 100
low-at = 20
poll-interval = 5
format-charging = <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-low = <label-low>
label-charging = 󰂄 %percentage%%
label-discharging = %percentage%%
label-full = 󰁹 %percentage%%
label-low = 󰁺 %percentage%%
ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂

;[module/cpu]
;type = internal/cpu
;interval = 2
;;format-prefix = "CPU "
;format-prefix = "󰍛 "
;format-prefix-foreground = ${colors.primary}
;label = %percentage:2%%

[module/cpu]
type = custom/script
exec = qvm-run --pass-io personal "vmstat 1 2 | tail -1 | awk '{print 100-\$15}'"
exec-if = qvm-check --running personal
interval = 5
;format-prefix = "CPU "
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.primary}
label = %output:2%%

;[module/memory]
;type = internal/memory
;interval = 2
;;format-prefix = "RAM "
;format-prefix = " "
;format-prefix-foreground = ${colors.primary}
;label = %percentage_used:2%%

[module/memory]
type = custom/script
exec = qvm-run --pass-io personal "free | awk '/^Mem/{printf \"%.0f\n\", \$3*100/\$2}'"
exec-if = qvm-check --running personal
interval = 5
;format-prefix = "RAM "
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %output:2%%

[filesystem-base]
type = internal/fs
interval = 30
label-unmounted = ""
label-unmounted-foreground = ${colors.disabled}

;[module/root]
;inherit = filesystem-base
;mount-0 = /
;label-mounted = %{F#F0C674}󰆼%{F-} %percentage_used%%

[module/root]
type = custom/script
exec = qvm-pool -i vm-pool | awk '/^size/{s=$2} /^usage/{u=$2} END {printf "%.0f\n", u*100/s}'
interval = 5
;format-prefix = "ROOT "
format-prefix = "󰆼 "
format-prefix-foreground = ${colors.primary}
label = %output:2%%

;[module/home]
;inherit = filesystem-base
;mount-0 = /home
;label-mounted = %{F#F0C674}%{F-} %percentage_used%%

[module/home]
type = custom/script
exec = qvm-run --pass-io personal "df --output=pcent /home | tail -n 1 | tr -d ' %'"
exec-if = qvm-check --running personal
interval = 5
;format-prefix = "HOME "
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %output:2%%

[module/volume]
type = internal/pulseaudio
;format-volume-prefix = "VOL "
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = MUTED
label-muted-foreground = ${colors.disabled}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/lock]
type = internal/xkeyboard
format = <label-indicator>
format-spacing = 0
blacklist-0 = scroll lock
label-indicator-padding = 1
label-indicator-margin = 1
label-indicator-foreground = ${colors.primary}
label-indicator-background = ${colors.background}
;label-indicator-on-capslock = "%{F#F0C674}CAP%{F-}"
;label-indicator-off-capslock = "%{F#707880}CAP%{F-}"
;label-indicator-on-numlock = "%{F#F0C674}NUM%{F-}"
;label-indicator-off-numlock = "%{F#707880}NUM%{F-}"
;label-indicator-on-scrolllock = "%{F#F0C674}SCR%{F-}"
;label-indicator-off-scrolllock = "%{F#707880}SCR%{F-}"
;label-indicator-on-capslock = "%{F#F0C674}⇪%{F-}"
;label-indicator-off-capslock = "%{F#707880}⇪%{F-}"
;label-indicator-on-numlock = "%{F#F0C674}⇭%{F-}"
;label-indicator-off-numlock = "%{F#707880}⇭%{F-}"
;label-indicator-on-scrolllock = "%{F#F0C674}⇬%{F-}"
;label-indicator-off-scrolllock = "%{F#707880}⇬%{F-}"
label-indicator-on-capslock = "%{F#F0C674}󰬊%{F-}"
label-indicator-off-capslock = "%{F#707880}󰯱%{F-}"
label-indicator-on-numlock = "%{F#F0C674}󰬕%{F-}"
label-indicator-off-numlock = "%{F#707880}󰰒%{F-}"
label-indicator-on-scrolllock = "%{F#F0C674}󰬚%{F-}"
label-indicator-off-scrolllock = "%{F#707880}󰰡%{F-}"

[module/date]
type = internal/date
interval = 1
date = %a %b %d %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
